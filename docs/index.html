<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BlaBlaCutter</title>
  <style>
:root {
  color-scheme: light;
  --bg: #f7f8fb;
  --surface: #ffffff;
  --text: #1f2937;
  --muted: #64748b;
  --line: #e2e8f0;
  --accent: #2563eb;
  --accent-soft: #eff6ff;
  --sidebar: #0f172a;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
    "Microsoft YaHei", sans-serif;
  line-height: 1.72;
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 24px;
  height: 56px;
  padding: 0 28px;
  color: #fff;
  background: var(--sidebar);
  box-shadow: 0 1px 0 rgba(15, 23, 42, .12);
}
.brand {
  color: #fff;
  font-weight: 700;
  text-decoration: none;
  white-space: nowrap;
}
.page-title {
  overflow: hidden;
  color: #cbd5e1;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.layout {
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr) 260px;
  gap: 0;
  max-width: 1500px;
  margin: 0 auto;
}
.sidebar,
.toc {
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
  overflow: auto;
  padding: 28px 18px;
}
.sidebar {
  border-right: 1px solid var(--line);
  background: #fff;
}
.toc {
  border-left: 1px solid var(--line);
  background: #fff;
}
.nav-link,
.toc a {
  display: block;
  color: var(--muted);
  text-decoration: none;
}
.nav-link {
  margin-bottom: 4px;
  padding: 9px 10px;
  border-radius: 6px;
  font-size: 14px;
}
.nav-link:hover,
.nav-link.active {
  color: var(--accent);
  background: var(--accent-soft);
}
.toc-title {
  margin-bottom: 10px;
  color: var(--text);
  font-size: 13px;
  font-weight: 700;
}
.toc a {
  padding: 5px 0;
  font-size: 13px;
}
.toc a:hover { color: var(--accent); }
.toc-level-3 { padding-left: 16px !important; }
.content {
  min-width: 0;
  padding: 36px 48px 80px;
}
article {
  max-width: 900px;
  margin: 0 auto;
  padding: 36px 44px 56px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
}
h1, h2, h3, h4, h5, h6 {
  position: relative;
  line-height: 1.28;
  scroll-margin-top: 76px;
}
h1 {
  margin-top: 0;
  font-size: 30px;
}
h2 {
  margin-top: 42px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
  font-size: 24px;
}
h3 { margin-top: 30px; font-size: 20px; }
h4 { margin-top: 24px; font-size: 17px; }
.anchor {
  margin-left: 8px;
  color: #94a3b8;
  font-size: .72em;
  text-decoration: none;
  opacity: 0;
}
h1:hover .anchor,
h2:hover .anchor,
h3:hover .anchor,
h4:hover .anchor { opacity: 1; }
p { margin: 14px 0; }
ul, ol { padding-left: 1.35em; }
li { margin: 5px 0; }
a { color: var(--accent); }
hr {
  border: 0;
  border-top: 1px solid var(--line);
  margin: 28px 0;
}
code {
  padding: 2px 5px;
  border-radius: 4px;
  background: #f1f5f9;
  font-size: .92em;
}
pre {
  overflow: auto;
  padding: 16px;
  border-radius: 8px;
  background: #0f172a;
  color: #e2e8f0;
}
pre code { padding: 0; background: transparent; color: inherit; }
figure {
  margin: 24px 0;
  text-align: center;
}
figure img,
p img {
  max-width: 100%;
  height: auto;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
}
table {
  border-collapse: collapse;
  width: 100%;
  margin: 16px 0;
  font-size: 14px;
  overflow-x: auto;
  display: block;
}
table th, table td {
  padding: 8px 12px;
  border: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
  white-space: nowrap;
}
table thead th {
  background: #f1f5f9;
  font-weight: 700;
}
table tbody tr:nth-child(even) {
  background: #fafbfc;
}
table tbody tr:hover {
  background: var(--accent-soft);
}
figure em {
  display: block;
  margin-top: 8px;
  color: var(--muted);
  font-size: 14px;
}
.index {
  max-width: 900px;
  margin: 0 auto;
  padding: 56px 28px;
}
.report-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
}
.report-card {
  display: block;
  padding: 20px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--text);
  text-decoration: none;
}
.report-card:hover {
  border-color: #bfdbfe;
  box-shadow: 0 8px 24px rgba(15, 23, 42, .08);
}
.report-card span {
  display: block;
  font-weight: 700;
}
	.report-card small {
	  color: var(--muted);
	}
	.paper-card p {
	  margin: 10px 0 0;
	  color: var(--muted);
	  font-size: 14px;
	  line-height: 1.55;
	}
	.muted { color: var(--muted); }
@media (max-width: 1100px) {
  .layout { grid-template-columns: 190px minmax(0, 1fr); }
  .toc { display: none; }
}
@media (max-width: 760px) {
  .topbar { padding: 0 16px; }
  .layout { display: block; }
  .sidebar {
    position: static;
    height: auto;
    border-right: 0;
    border-bottom: 1px solid var(--line);
    padding: 12px;
  }
  .content { padding: 20px 12px 48px; }
  article { padding: 24px 18px 40px; }
  h1 { font-size: 25px; }
  h2 { font-size: 21px; }
}
</style>
</head>
<body>
  <header class="topbar">
    <span class="brand">BlaBlaCutter</span>
    <span class="page-title">Paper Library</span>
  </header>
  <main class="index">
    <h1>BlaBlaCutter 论文库</h1>
    <div class="report-grid"><a class="report-card paper-card" href="the-xor-cache-a-catalyst-for-compression/index.html"><span>The XOR Cache: A Catalyst for Compression</span><small>ISCA · 2025</small><p>提出XOR Cache：利用LLC与私有缓存/包含性冗余，将两条缓存线做位异或后共存于一个槽位，并与BΔI等压缩协同降低熵。通过gem5评估，LLC面积和功耗分别降至1.93×、1.92×，平均性能开销仅2.06%，EDP下降26.3%。</p></a></div>
  </main>
</body>
</html>
